  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #8B0000; border-radius: 2px; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    .fade-up { animation: fadeUp 0.5s ease both; }

    .btn {
      padding: 0.45rem 1.1rem;
      border-radius: 2rem;
      cursor: pointer;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      transition: all 0.2s ease;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.75);
    }
    .btn:hover { background: rgba(255,255,255,0.14); color: #fff; }
    .btn.active {
      background: #FFD700;
      color: #000;
      border-color: #FFD700;
      font-weight: 600;
    }

    .day-btn {
      flex-shrink: 0;
      min-width: 66px;
      padding: 0.55rem 0.7rem;
      border-radius: 0.6rem;
      cursor: pointer;
      font-family: 'Cormorant Garamond', serif;
      text-align: center;
      transition: all 0.2s ease;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.55);
    }
    .day-btn:hover { background: rgba(255,255,255,0.09); color: #fff; }
    .day-btn.active { color: #fff; }

    .card {
      border-radius: 0.85rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      transition: border-color 0.2s;
    }
    .card:hover { border-color: rgba(255,255,255,0.14); }

    .day-scroll {
      display: flex;
      overflow-x: auto;
      gap: 0.5rem;
      padding: 1rem 1rem 0.6rem;
      scrollbar-width: none;
    }
    .day-scroll::-webkit-scrollbar { display: none; }

    .gold-text {
      background: linear-gradient(90deg, #FFD700, #FFA500, #FFD700);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s linear infinite;
    }

      ["TOTALE stimato per 2 persone", "~¥400.000 ≈ €2.400"]
    ];

    const checklist = [
      ["teamLab Planets Toyosu", "teamlab.art · esaurito settimane prima"],
      ["JR Pass 7 giorni × 2", "jrailpass.com · acquista da casa"],
      ["Hakone Free Pass × 2", "odakyu.jp · include Romancecar + funivia + barca"],
      ["Pocket Wi-Fi o eSIM", "Airalo / aeroporto Haneda"],
      ["Ryokan a Kyoto (1 notte)", "almeno 1 notte · Yoshida-sanso o simile"],
      ["Omakase cena finale", "tabelog.com o prenotazione diretta"]
    ];

    function App() {
      const [activeDay, setActiveDay] = useState(0);
      const [tab, setTab] = useState("itinerary");
      const day = days[activeDay];

      return (
        <div style={{ fontFamily: "'Cormorant Garamond', Georgia, serif", background: "linear-gradient(160deg,#0a0306 0%,#0d0a04 60%,#040a0d 100%)", minHeight: "100vh", color: "#f0ece4" }}>

          {/* ── HEADER ── */}
          <div style={{ background: "linear-gradient(135deg,#6b0000,#9b1a1a,#6b0000)", padding: "2rem 1.5rem 1.5rem", textAlign: "center", borderBottom: "2px solid #8B6914", position: "relative", overflow: "hidden" }}>
            <div style={{ position: "absolute", inset: 0, backgroundImage: "radial-gradient(circle at 20% 50%, rgba(255,200,0,0.08) 0%, transparent 60%), radial-gradient(circle at 80% 50%, rgba(139,0,0,0.3) 0%, transparent 60%)", pointerEvents: "none" }} />
            <div style={{ position: "relative", zIndex: 1 }}>
              <div style={{ fontSize: "0.7rem", letterSpacing: "0.35em", color: "#FFD700", marginBottom: "0.6rem", textTransform: "uppercase" }}>
                Giorgio & Lucrezia · Estate 2026
              </div>
              <h1 style={{ fontSize: "clamp(2rem,6vw,3rem)", fontWeight: 300, margin: 0, letterSpacing: "0.06em", color: "#fff", lineHeight: 1.1 }}>
                🎌 <span className="gold-text">日本</span> · Giappone
              </h1>
              <div style={{ fontSize: "0.9rem", color: "rgba(255,215,0,0.8)", marginTop: "0.5rem", letterSpacing: "0.12em", fontStyle: "italic" }}>

                {[["itinerary","🗾 Itinerario"],["transport","🚄 Trasporti"],["budget","💴 Budget"]].map(([key, label]) => (
                  <button key={key} className={`btn ${tab === key ? "active" : ""}`} onClick={() => setTab(key)}>{label}</button>
                ))}
              </div>
            </div>
          </div>

          {/* ── ITINERARY TAB ── */}

            <div className="fade-up">
              <div className="day-scroll">
                {days.map((d, i) => (
                  <button key={i} className={`day-btn ${activeDay === i ? "active" : ""}`}
                    style={activeDay === i ? { borderColor: d.color, background: `${d.color}20` } : {}}
                    onClick={() => setActiveDay(i)}>
                    <div style={{ fontSize: "1.2rem" }}>{d.emoji}</div>
                    <div style={{ fontSize: "0.78rem", fontWeight: activeDay === i ? 600 : 400, marginTop: "0.15rem" }}>G{d.day}</div>
                    <div style={{ fontSize: "0.62rem", opacity: 0.75, marginTop: "0.1rem" }}>{d.city}</div>
                  </button>
                ))}
              </div>

              {/* Day header */}
              <div style={{ margin: "0.8rem 1rem 0", padding: "1.1rem 1.2rem", borderRadius: "0.85rem", background: `linear-gradient(135deg,${day.color}28,${day.color}0d)`, border: `1px solid ${day.color}44`, borderLeft: `4px solid ${day.color}` }}>

                  <div>
                    <div style={{ fontSize: "0.68rem", color: day.color, letterSpacing: "0.18em", textTransform: "uppercase" }}>{day.date} · Giorno {day.day}</div>

                  </div>
                  <span style={{ padding: "0.25rem 0.8rem", borderRadius: "2rem", background: `${day.color}33`, fontSize: "0.75rem", color: "#FFD700", border: `1px solid ${day.color}44`, whiteSpace: "nowrap" }}>📍 {day.city}</span>
                </div>
              </div>

              {/* Activities */}
              <div style={{ padding: "0.8rem 1rem 0", display: "flex", flexDirection: "column", gap: "0.7rem" }}>
                {day.activities.map((act, i) => (
                  <div key={i} className="card" style={{ display: "flex", gap: "0.9rem", padding: "0.95rem 1rem" }}>
                    <div style={{ flexShrink: 0, width: "42px", textAlign: "center" }}>
                      <div style={{ fontSize: "1.4rem" }}>{act.icon}</div>
                      {act.time && <div style={{ fontSize: "0.6rem", color: day.color, marginTop: "0.2rem", fontWeight: 600, fontFamily: "'DM Mono', monospace" }}>{act.time}</div>}
                    </div>
                    <div>
                      <div style={{ fontSize: "0.95rem", fontWeight: 600, color: "#fff", marginBottom: "0.3rem" }}>{act.title}</div>
                      <div style={{ fontSize: "0.8rem", color: "rgba(240,236,228,0.7)", lineHeight: 1.55 }}>{act.detail}</div>
                    </div>
                  </div>
                ))}
              </div>

              {/* Hotel */}
              {day.hotel && (
                <div style={{ margin: "0.8rem 1rem 0", padding: "1rem 1.1rem", borderRadius: "0.85rem", background: "rgba(255,215,0,0.07)", border: "1px solid rgba(255,215,0,0.22)" }}>
                  <div style={{ fontSize: "0.65rem", color: "#FFD700", letterSpacing: "0.18em", marginBottom: "0.45rem", textTransform: "uppercase" }}>🏨 Hotel consigliato</div>
                  <div style={{ fontSize: "0.95rem", color: "#fff" }}>{"⭐".repeat(day.hotel.stars)} {day.hotel.name}</div>
                  <div style={{ fontSize: "0.77rem", color: "rgba(240,236,228,0.65)", marginTop: "0.3rem", lineHeight: 1.5 }}>{day.hotel.note}</div>
                </div>
              )}

              {/* Tip */}
              {day.tip && (
                <div style={{ margin: "0.8rem 1rem 1.5rem", padding: "1rem 1.1rem", borderRadius: "0.85rem", background: "rgba(192,57,43,0.1)", border: "1px solid rgba(192,57,43,0.25)", borderLeft: "3px solid #C0392B" }}>
                  <div style={{ fontSize: "0.65rem", color: "#C0392B", letterSpacing: "0.18em", marginBottom: "0.35rem", textTransform: "uppercase" }}>💡 Consiglio da insider</div>
                  <div style={{ fontSize: "0.8rem", color: "rgba(240,236,228,0.8)", lineHeight: 1.55 }}>{day.tip}</div>
                </div>
              )}
            </div>
          )}

          {tab === "transport" && (
            <div className="fade-up" style={{ padding: "1rem", display: "flex", flexDirection: "column", gap: "0.8rem" }}>

                <div key={i} className="card" style={{ padding: "1.1rem 1.15rem" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "0.5rem" }}>
                    <span style={{ fontSize: "0.95rem", color: "#fff" }}>{t.icon} {t.title}</span>
                    <span style={{ padding: "0.2rem 0.65rem", borderRadius: "1rem", fontSize: "0.62rem", background: `${t.tagColor}33`, color: t.tagColor, border: `1px solid ${t.tagColor}55` }}>{t.tag}</span>
                  </div>
                  <div style={{ fontSize: "0.8rem", color: "rgba(240,236,228,0.68)", lineHeight: 1.55 }}>{t.detail}</div>
                </div>
              ))}

              <div style={{ padding: "1.2rem", borderRadius: "0.85rem", background: "rgba(255,215,0,0.07)", border: "1px solid rgba(255,215,0,0.18)", marginTop: "0.4rem" }}>
                <div style={{ fontSize: "0.68rem", color: "#FFD700", marginBottom: "0.85rem", letterSpacing: "0.15em", textTransform: "uppercase" }}>🚄 Mappa del viaggio</div>
                {route.map((r, i) => (
                  <div key={i} style={{ display: "flex", alignItems: "center", gap: "0.6rem", padding: "0.5rem 0", borderBottom: i < route.length - 1 ? "1px solid rgba(255,255,255,0.05)" : "none", fontSize: "0.78rem" }}>
                    <span style={{ color: "#FFD700", fontWeight: 600, minWidth: "52px", fontFamily: "'DM Mono', monospace" }}>{r.from}</span>
                    <span style={{ opacity: 0.7 }}>{r.icon}</span>
                    <span style={{ color: "#FFD700", fontWeight: 600, minWidth: "52px", fontFamily: "'DM Mono', monospace" }}>{r.to}</span>
                    <span style={{ color: "rgba(240,236,228,0.55)", fontSize: "0.72rem" }}>{r.label}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* ── BUDGET TAB ── */}
          {tab === "budget" && (
            <div className="fade-up" style={{ padding: "1rem" }}>
              <div style={{ fontSize: "0.68rem", color: "rgba(240,236,228,0.4)", letterSpacing: "0.18em", textTransform: "uppercase", padding: "0.3rem 0 0.8rem" }}>Stima di spesa per 2 persone · voli esclusi</div>
              <div style={{ borderRadius: "0.85rem", overflow: "hidden", border: "1px solid rgba(255,255,255,0.07)" }}>
                {budget.map(([voce, costo], i) => {
                  const isLast = i === budget.length - 1;
                  return (
                    <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "0.9rem 1.1rem", background: isLast ? "rgba(255,215,0,0.1)" : i % 2 === 0 ? "rgba(255,255,255,0.035)" : "transparent", borderTop: i > 0 ? "1px solid rgba(255,255,255,0.06)" : "none" }}>
                      <span style={{ fontSize: isLast ? "0.88rem" : "0.82rem", color: isLast ? "#FFD700" : "rgba(240,236,228,0.78)", fontWeight: isLast ? 600 : 400 }}>{voce}</span>
                      <span style={{ fontSize: isLast ? "0.95rem" : "0.85rem", color: isLast ? "#FFD700" : "#fff", fontWeight: isLast ? 600 : 400, fontFamily: "'DM Mono', monospace" }}>{costo}</span>
                    </div>
                  );
                })}
              </div>

              <div style={{ marginTop: "1.2rem", padding: "1.1rem", borderRadius: "0.85rem", background: "rgba(192,57,43,0.09)", border: "1px solid rgba(192,57,43,0.22)" }}>
                <div style={{ fontSize: "0.68rem", color: "#C0392B", marginBottom: "0.8rem", letterSpacing: "0.15em", textTransform: "uppercase" }}>📋 Da prenotare prima di partire</div>
                {checklist.map(([item, note], i) => (
                  <div key={i} style={{ display: "flex", gap: "0.5rem", padding: "0.42rem 0", borderBottom: i < checklist.length - 1 ? "1px solid rgba(255,255,255,0.05)" : "none", fontSize: "0.78rem" }}>
                    <span style={{ color: "#C0392B", flexShrink: 0 }}>✓</span>
                    <div>
                      <span style={{ color: "#fff" }}>{item}</span>
                      <span style={{ color: "rgba(240,236,228,0.45)", marginLeft: "0.5rem" }}>— {note}</span>
                    </div>
                  </div>
                ))}
              </div>

              <div style={{ marginTop: "1rem", padding: "0.9rem 1rem", borderRadius: "0.85rem", background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.07)", fontSize: "0.74rem", color: "rgba(240,236,228,0.48)", lineHeight: 1.6 }}>
                💴 Cambio indicativo: 1€ ≈ ¥160–165. Il Giappone è tornato a essere una destinazione di medio costo per i turisti europei grazie allo yen debole.
              </div>
            </div>
          )}

          {/* ── FOOTER ── */}
          <div style={{ padding: "2rem 1.5rem", textAlign: "center", fontSize: "0.72rem", color: "rgba(240,236,228,0.25)", letterSpacing: "0.12em", borderTop: "1px solid rgba(255,255,255,0.05)", marginTop: "0.5rem" }}>
            良い旅を · Buon viaggio, Giorgio & Lucrezia 🎌
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
